<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0004">
  <title>Student — Smart Attendance</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app">
  <div class="top-header">
    <div class="header-brand">⚡ SmartAtt</div>
    <div class="header-page-title" id="header-title">My Attendance</div>
    <div class="header-avatar" id="header-avatar" onclick="navigate('profile')">ST</div>
  </div>

  <div id="page-attendance" class="page-content active">
    <div class="welcome-banner">
      <div class="welcome-time" id="welcome-time">Good morning</div>
      <div class="welcome-name" id="welcome-name">Student</div>
      <div class="welcome-sub">Here is your attendance record</div>
    </div>
    <div class="stats-grid" style="grid-template-columns:1fr 1fr 1fr;">
      <div class="stat-card green"><div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div><div class="stat-value" id="my-present">0</div><div class="stat-label">Present</div></div>
      <div class="stat-card orange"><div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="stat-value" id="my-late">0</div><div class="stat-label">Late</div></div>
      <div class="stat-card red"><div class="stat-icon red"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div><div class="stat-value" id="my-absent">0</div><div class="stat-label">Absent</div></div>
    </div>
    <div class="section-title" style="margin-bottom:12px;">My Sessions</div>
    <div id="my-history-list"><div class="spinner"></div></div>
  </div>

  <div id="page-profile" class="page-content">
    <div class="profile-hero">
      <div class="profile-avatar-lg" id="profile-avatar-lg">ST</div>
      <div class="profile-name" id="profile-name">Student</div>
      <div class="profile-email" id="profile-studentid" style="font-size:13px;color:var(--accent);margin-top:4px;"></div>
      <div class="profile-email" id="profile-section"></div>
      <div class="role-badge student-badge">🎓 Student</div>
    </div>
    <div class="glass-card">
      <div class="card-title">Edit My Info</div>
      <div style="padding:10px;background:rgba(255,171,64,0.08);border:1px solid rgba(255,171,64,0.2);border-radius:10px;font-size:12px;color:var(--warning);margin-bottom:16px;">
        ⚠ You can only change your name, avatar, and email. Attendance is managed by your teacher.
      </div>
      <div class="form-group"><label>Display Name</label><input type="text" id="profile-name-input" placeholder="Your name"></div>
      <div class="form-group"><label>Email (optional)</label><input type="email" id="profile-email-input" placeholder="your@email.com"></div>
      <div class="form-group">
        <label>Avatar (2 letters)</label>
        <input type="text" id="profile-avatar-input" placeholder="e.g. JD" maxlength="2" style="text-transform:uppercase;">
      </div>
      <button class="btn btn-primary-sm btn-full" onclick="saveProfile()">Save Changes</button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-danger-sm btn-full" onclick="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out
    </button>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" id="nav-attendance" onclick="navigate('attendance')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>My Attendance</span>
    </div>
    <div class="nav-item" id="nav-profile" onclick="navigate('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 21v-1a6 6 0 0 1 12 0v1"/></svg>
      <span>Profile</span>
    </div>
  </nav>
</div>

<div class="modal-overlay" id="modal-history-detail" onclick="closeModal('modal-history-detail')">
  <div class="modal-sheet" onclick="event.stopPropagation()" style="max-height:90vh;">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-detail-title">Session Details</div>
    <div id="modal-detail-content"></div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="/js/student.js"></script>
</body>
</html>
